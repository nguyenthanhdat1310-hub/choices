<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lựa Chọn Thông Minh — Trợ lý ra quyết định PrOACT</title>
<style>
  :root{
    --paper:#F7F5F0; --card:#FFFFFF; --ink:#23303F; --ink-soft:#5A6675;
    --line:#E3DFD5; --brass:#A66A1E; --brass-soft:#F3E7D3;
    --good:#4C7A5C; --good-soft:#E7EFE9; --warn:#9C4A31; --warn-soft:#F6E8E2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.5}
  .serif{font-family:'Times New Roman','Segoe UI',Tahoma,serif}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px}
  .head-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
  .app-title{font-family:'Times New Roman','Segoe UI',Tahoma,serif;font-size:24px}
  .app-sub{font-size:12.5px;color:var(--ink-soft)}
  main{max-width:1280px;margin:0 auto;padding:24px 16px 70px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 22px}
  .row-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;gap:12px}
  h1{font-family:'Times New Roman','Segoe UI',Tahoma,serif;font-size:22px;margin:0}
  h2{font-family:'Times New Roman','Segoe UI',Tahoma,serif;font-size:21px;margin:0 0 4px}
  h3{font-family:'Times New Roman','Segoe UI',Tahoma,serif;font-size:16px;margin:22px 0 6px;color:var(--ink)}
  .sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:18px;max-width:860px}
  .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:10px 0 4px}
  textarea,input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font:inherit;font-size:15px;color:var(--ink);background:#FDFCFA;resize:vertical;outline:none}
  select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font:inherit;font-size:15px;color:var(--ink);background:#FDFCFA;outline:none}
  input[type=number]{width:56px;padding:6px 4px;text-align:center;border:1px solid var(--line);border-radius:6px;
    font:inherit;font-size:15px;background:#FDFCFA}
  button{font:inherit;font-weight:600;border-radius:8px;cursor:pointer;padding:10px 20px;font-size:15px;
    touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,.08)}
  .btn-primary{background:var(--ink);color:#fff;border:none}
  .btn-outline{background:transparent;color:var(--ink);border:1px solid var(--ink)}
  .btn-subtle{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .btn-small{padding:6px 12px;font-size:13px}
  button:disabled{opacity:.4;cursor:default}
  button:active:not(:disabled){opacity:.7}
  .x-btn{border:none;background:none;color:var(--ink-soft);font-size:17px;padding:2px 6px;min-width:36px;min-height:36px;
    display:inline-flex;align-items:center;justify-content:center}
  .hint{font-size:13.5px;line-height:1.55;padding:10px 14px;border-radius:8px;margin:12px 0;max-width:860px;
    background:var(--brass-soft);color:#6E4A17}
  .hint.warn{background:var(--warn-soft);color:var(--warn)}
  .hint.good{background:var(--good-soft);color:var(--good)}
  .bulk-panel{background:#FDFCFA;border:1px solid var(--line);border-radius:10px;padding:14px;max-width:860px}
  .bulk-panel textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px}
  .steps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .step-pill{font-size:12px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-weight:400;touch-action:manipulation;min-height:36px}
  .step-pill.done{background:var(--brass-soft)}
  .step-pill.now{background:var(--ink);border-color:var(--ink);color:#fff}
  .obj-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .obj-row .name{flex:1}
  .obj-row input.edit-inline{flex:1;width:auto;padding:6px 10px}
  input[type=range]{width:110px;accent-color:var(--brass);touch-action:manipulation}
  .wt{font-family:'Times New Roman','Segoe UI',Tahoma,serif;width:26px;text-align:center;font-size:16px;color:var(--brass)}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--ink)}
  th.alt{text-align:center;min-width:150px}
  td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  td.score{text-align:center;padding:6px 10px}
  td.cons-cell{padding:6px;min-width:180px}
  td.cons-cell textarea{font-size:13px;padding:6px 8px}
  .score-words{font-size:11px;color:var(--ink-soft);margin-top:3px;max-width:150px;margin-left:auto;margin-right:auto}
  .table-wrap{overflow-x:auto}
  .table-wrap table th:first-child,.table-wrap table td:first-child{
    position:sticky;left:0;background:var(--card);z-index:1;min-width:120px;max-width:170px}
  .bar-track{height:12px;background:var(--paper);border-radius:999px;border:1px solid var(--line);overflow:hidden}
  .bar-fill{height:100%;background:#B9BFC7;transition:width .4s ease}
  .bar-fill.top{background:var(--brass)}
  .bar-head{display:flex;justify-content:space-between;font-size:14.5px;margin-bottom:4px}
  .trap{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .trap input{margin-top:3px;accent-color:var(--brass);width:16px;height:16px}
  .trap .t-name{font-size:14.5px;font-weight:600}
  .trap .t-q{font-size:13.5px;color:var(--ink-soft)}
  .leader-box{background:var(--brass-soft);border-radius:12px;padding:18px 20px;margin-bottom:16px}
  .leader-eyebrow{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#6E4A17}
  .leader-name{font-family:'Times New Roman','Segoe UI',Tahoma,serif;font-size:24px}
  .nav{display:flex;justify-content:space-between;margin-top:16px}
  .add-row{display:flex;gap:8px}
  .add-row input{flex:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr}}
  .mini-card{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;background:#FDFCFA}
  .muted{color:var(--ink-soft);font-size:12.5px}
  .empty{padding:36px 24px;text-align:center;color:var(--ink-soft)}
  .strike{text-decoration:line-through}
  .dim{opacity:.45}
  #summary-text{width:100%;padding:14px;border:1px solid var(--line);border-radius:10px;font-size:13px;
    background:#FDFCFA;line-height:1.6;font-family:inherit}
  /* --- Login screen --- */
  #login-screen{position:fixed;inset:0;background:var(--paper);z-index:999;display:flex;align-items:center;justify-content:center}
  .login-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 32px;max-width:380px;width:90%;text-align:center}
  .login-box h1{margin-bottom:6px}
  .login-box .app-sub{margin-bottom:24px}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px 20px;
    font:inherit;font-size:15px;font-weight:600;border:1px solid var(--line);border-radius:8px;
    background:var(--card);color:var(--ink);cursor:pointer;transition:box-shadow .2s}
  .btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .login-error{color:var(--warn);font-size:13px;min-height:20px;margin-top:12px}
  .sync-badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600}
  .sync-ok{background:var(--good-soft);color:var(--good)}
  .sync-saving{background:#FEF3CD;color:#856404}
  .sync-off{background:var(--warn-soft);color:var(--warn)}
  .user-info{font-size:12px;color:var(--ink-soft)}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h1 class="serif">Lựa Chọn Thông Minh</h1>
    <div class="app-sub">Đăng nhập để đồng bộ dữ liệu giữa các thiết bị</div>
    <button class="btn-google" id="login-btn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Đăng nhập với Google
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<header>
  <div class="head-inner">
    <div>
      <div class="app-title">Lựa Chọn Thông Minh</div>
      <div class="app-sub">Trợ lý ra quyết định PrOACT · Hammond, Keeney &amp; Raiffa</div>
    </div>
    <button class="btn-subtle btn-small" id="back-btn" style="display:none">← Tất cả quyết định</button>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="sync-badge" class="sync-badge sync-ok" style="display:none"></span>
      <span id="user-info" class="user-info" style="display:none"></span>
      <button class="btn-subtle btn-small" id="logout-btn" style="display:none">Đăng xuất</button>
    </div>
  </div>
</header>
<main id="main"></main>

<script>
"use strict";
// Global error handler — show visible error instead of blank screen on mobile
window.onerror = function(msg, src, line, col, err){
  const m = document.getElementById("main");
  if(m && !m.innerHTML.trim()){
    m.innerHTML = `<div class="card" style="margin-top:20px">
      <h2>⚠ Lỗi ứng dụng</h2>
      <div class="hint warn">${msg}<br><small>${src}:${line}</small></div>
      <button class="btn-primary" style="margin-top:12px" onclick="location.reload()">Tải lại trang</button>
    </div>`;
  }
  console.error("App error:", msg, src, line, col, err);
};
window.addEventListener("unhandledrejection", ev=>{
  console.error("Unhandled promise rejection:", ev.reason);
});

// Parse an HTML string from the clipboard and extract the first <table> as a 2D grid.
// Returns [] if no table is found.
function parseHTMLTable(html){
  if(!html) return [];
  // Use a DOMParser to safely extract table cells
  try {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const table = doc.querySelector("table");
    if(!table) return [];
    const grid = [];
    for(const tr of table.querySelectorAll("tr")){
      const row = [];
      for(const cell of tr.querySelectorAll("th, td")){
        row.push((cell.textContent || "").trim());
      }
      if(row.length) grid.push(row);
    }
    return grid;
  } catch(e){ return []; }
}

// Parse text pasted/typed from Excel, Google Sheets, or a markdown table (e.g. copied
// from a Claude chat reply) into a 2D grid of strings. Auto-detects the column
// delimiter: real tabs first, then markdown "|" pipes, then runs of 2+ spaces.
function parseGrid(text){
  if(!text) return [];
  let lines = text.replace(/\r\n?/g,"\n").split("\n");
  // drop blank lines and markdown separator rows like "---|---|---" or ":--|:-:"
  lines = lines.filter(l => l.trim()!=="" && !/^[\s|:\-]+$/.test(l));
  if(!lines.length) return [];
  const hasTab = lines.some(l=>l.includes("\t"));
  const hasPipe = lines.some(l=>l.includes("|"));
  return lines.map(line=>{
    let cells;
    if(hasTab){
      cells = line.split("\t");
    } else if(hasPipe){
      cells = line.split("|");
      // drop empty leading/trailing cell caused by a leading/trailing "|"
      if(cells.length && cells[0].trim()==="") cells.shift();
      if(cells.length && cells[cells.length-1].trim()==="") cells.pop();
    } else {
      cells = line.split(/ {2,}/);
    }
    return cells.map(c=>c.trim());
  });
}

// Strip header row / label column if the pasted grid came from a full table (e.g. copied
// from Claude's chat, a webpage, or any table that includes column headers and row labels).
// Compares against the current decision's objective and alternative names.
function smartStripGrid(grid, d){
  if(!grid.length || !d) return grid;
  const alts = d.alternatives.filter(a=>!a.eliminated);
  const norm = s => (s||"").trim().toLowerCase().replace(/\s+/g," ");

  // --- Detect header row (row 0 contains alternative names) ---
  // Check if at least 2 cells in the first row fuzzy-match alternative names
  let stripRow = false;
  if(grid.length > 1){
    const row0 = grid[0];
    let altMatches = 0;
    for(const cell of row0){
      const cn = norm(cell);
      if(!cn) continue;
      for(const a of alts){
        const an = norm(a.name);
        // Match if one contains the other (handles truncation / prefix matching)
        if(an && (cn.includes(an) || an.includes(cn))){ altMatches++; break; }
      }
    }
    // Also detect generic header labels like "Mục tiêu", "Objective", etc.
    const first0 = norm(row0[0]);
    const genericHeaders = ["mục tiêu","objective","objectives","criteria","tiêu chí"];
    if(genericHeaders.includes(first0)) altMatches++;
    if(altMatches >= 2) stripRow = true;
  }

  // --- Detect label column (column 0 contains objective names) ---
  let stripCol = false;
  const startRow = stripRow ? 1 : 0;
  if(grid[0] && grid[0].length > 1){
    let objMatches = 0;
    let rowsChecked = 0;
    for(let ri = startRow; ri < grid.length; ri++){
      const cn = norm(grid[ri][0]);
      if(!cn) continue;
      rowsChecked++;
      for(const o of d.objectives){
        const on = norm(o.name);
        if(on && (cn.includes(on) || on.includes(cn))){ objMatches++; break; }
      }
    }
    // If most rows' first cell matches an objective name, strip the column
    if(rowsChecked > 0 && objMatches >= Math.min(rowsChecked, 2)) stripCol = true;
  }

  // Apply stripping
  let result = grid;
  if(stripRow) result = result.slice(1);
  if(stripCol) result = result.map(row => row.slice(1));
  return result;
}

// ---------- persistence ----------
function normalize(d){
  d.mode = d.mode || "full";
  d.step = d.step || 0;
  d.name = d.name ?? "";
  d.problem = d.problem || {initial:"",trigger:"",broader:""};
  d.problem.initial = d.problem.initial ?? "";
  d.problem.trigger = d.problem.trigger ?? "";
  d.problem.broader = d.problem.broader ?? "";
  d.objectives = Array.isArray(d.objectives) ? d.objectives : [];
  d.alternatives = Array.isArray(d.alternatives) ? d.alternatives : [];
  d.scores = d.scores || {};
  d.cons = d.cons || {};
  d.traps = d.traps || {};
  d.swaps = Array.isArray(d.swaps) ? d.swaps : [];
  d.risks = Array.isArray(d.risks) ? d.risks : [];
  d.riskTol = d.riskTol || {q1:"",q2:"",q3:""};
  d.linked = Array.isArray(d.linked) ? d.linked : [];
  d.objectives.forEach(o=>{ if(o.crossed===undefined) o.crossed=false; });
  return d;
}

function persist(){
  dirty = true;
  const d = active();
  if(!d) return;
  setSyncBadge("saving","Đang lưu…");
  // Clean undefined values (Realtime DB doesn't accept undefined)
  const clean = JSON.parse(JSON.stringify(d));
  decisionsRef().child(d.id).set(clean)
    .then(()=> setSyncBadge("ok","✓ Đã đồng bộ"))
    .catch(e=>{ console.error(e); setSyncBadge("off","✗ Lỗi lưu"); });
}

function startListening(){
  if(unsubscribe){ decisionsRef().off("value", unsubscribe); }
  let lastJson = "";
  unsubscribe = decisionsRef().on("value", snap=>{
    const data = snap.val() || {};
    const incoming = Object.values(data).map(normalize)
      .sort((a,b)=> (b.createdAt||"").localeCompare(a.createdAt||""));
    const incomingJson = JSON.stringify(incoming);
    if(incomingJson === lastJson) return;
    lastJson = incomingJson;
    const currentActiveId = state.activeId;
    state.decisions = incoming;
    state.activeId = currentActiveId;
    if(state.activeId && !state.decisions.find(d=>d.id===state.activeId)) state.activeId = null;
    setSyncBadge("ok","✓ Đã đồng bộ");
    // Don't re-render while user is typing — it would destroy cursor & focus
    if(!isUserTyping()) render();
  }, err=>{
    console.error("Database listen error:", err);
    setSyncBadge("off","✗ Mất kết nối");
    main.innerHTML = `<div class="card" style="margin-top:20px">
      <h2>⚠ Lỗi kết nối</h2>
      <div class="hint warn">Không thể tải dữ liệu: ${esc(err.message||err.code||"unknown")}.<br>Hãy tải lại trang hoặc kiểm tra kết nối mạng.</div>
      <button class="btn-primary" style="margin-top:12px" onclick="location.reload()">Tải lại trang</button>
    </div>`;
  });
}

// ---------- results math (crossed-out objectives are excluded) ----------
function compute(d){
  const alts = d.alternatives.filter(a=>!a.eliminated);
  const objs = d.objectives.filter(o=>!o.crossed);
  const maxTotal = objs.reduce((s,o)=>s+o.weight*10,0);
  const rows = alts.map(a=>{
    const sc = d.scores[a.id]||{};
    const complete = objs.length>0 && objs.every(o=>sc[o.id]!==undefined && sc[o.id]!=="");
    const total = objs.reduce((s,o)=>s+o.weight*(+sc[o.id]||0),0);
    return {alt:a,total,complete,pct:maxTotal?total/maxTotal:0};
  }).sort((x,y)=>y.total-x.total);
  const dominated=[];
  const scored=rows.filter(r=>r.complete);
  for(const b of scored){
    for(const a of scored){
      if(a===b)continue;
      const sa=d.scores[a.alt.id],sb=d.scores[b.alt.id];
      const ge=objs.every(o=>+sa[o.id]>=+sb[o.id]);
      const gt=objs.some(o=>+sa[o.id]>+sb[o.id]);
      if(ge&&gt){dominated.push({loser:b.alt.name,winner:a.alt.name});break;}
    }
  }
  return {rows,dominated};
}

function stepRail(d){
  const keys=keysFor(d);
  return `<div class="steps">${keys.map((k,i)=>
    `<button class="step-pill ${i===d.step?'now':i<d.step?'done':''}" data-step="${i}">${i+1}. ${stepName(k)}</button>`).join("")}</div>`;
}

function wizardHTML(d){
  const keys=keysFor(d);
  if(d.step>keys.length-1)d.step=keys.length-1;
  const BODIES={problem:problemHTML,objectives:objectivesHTML,alternatives:alternativesHTML,cons:consHTML,
    score:scoreHTML,results:resultsHTML,swaps:swapsHTML,risk:riskHTML,traps:trapsHTML,summary:summaryHTML};
  return `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <button class="step-pill ${d.mode==='quick'?'now':''}" data-mode="quick">${L.modeQuick}</button>
      <button class="step-pill ${d.mode!=='quick'?'now':''}" data-mode="full">${L.modeFull}</button>
      <span class="muted">${d.mode==='quick'?L.modeQuickHint:L.modeFullHint}</span>
    </div>
    ${stepRail(d)}
    <div class="card">${BODIES[keys[d.step]](d)}</div>
    <div class="nav">
      <button class="btn-subtle" data-step="${d.step-1}" ${d.step===0?"disabled":""}>${L.btnBack}</button>
      <button class="btn-primary" data-step="${d.step+1}" ${d.step===keys.length-1?"disabled":""}>

}

function summaryText(d){
  const {rows}=compute(d);
  const crossed=d.objectives.filter(o=>o.crossed);
  const lines=[
    `${L.y.txt.dec}: ${d.name||d.problem.initial||L.untitled}`,
    `${L.y.txt.prob}: ${d.problem.broader||d.problem.initial}`,``,
    `${L.y.txt.obj}: ${d.objectives.map(o=>`${o.name} (${o.weight})${o.crossed?` ${L.y.txt.crossedMark}`:""}`).join("; ")}`,``,
    `${L.y.txt.rank}:`,
    ...rows.map((r,i)=>`  ${i+1}. ${r.alt.name} — ${r.total} ${L.r.pts} (${Math.round(r.pct*100)}%)${r.complete?"":` ${L.y.txt.incomplete}`}`),
  ];
  if(rows[0]) lines.push(``,`${L.y.txt.lead}: ${rows[0].alt.name}`);
  if(d.swaps.length){
    lines.push(``,`${L.y.txt.swaps}:`);
    d.swaps.forEach(s=>lines.push(`  • ${s.objective} — ${s.altName}: ${s.give} → ${s.get}`));
  }
  if(d.risks.length){
    lines.push(``,`${L.y.txt.risks}:`);
    d.risks.forEach(x=>lines.push(`  • ${x.u} (${x.prob})${x.hedge?` — ${x.hedge}`:""}`));
  }
  if(d.linked.length){
    lines.push(``,`${L.y.txt.linked}:`);
    d.linked.forEach(x=>lines.push(`  • ${x.fut}${x.wide?` — ${x.wide}`:""}`));
  }
  lines.push(``,`${L.y.txt.traps}: ${TRAPS.filter(([n])=>d.traps[n]).length}/${TRAPS.length}`,
    `${L.y.txt.date}: ${L.dateStr()}`);
  return lines.join("\n");
}

// ---------- event delegation (mobile-safe: handlers live on main, survive DOM rebuilds) ----------
// helper: find closest ancestor with a given data attribute
const closest = (el, attr) => el.closest ? el.closest(`[data-${attr}]`) : null;
const dataOf  = (el, attr) => closest(el, attr)?.dataset[attr.replace(/-([a-z])/g,(_,c)=>c.toUpperCase())];

// ---- CLICK delegation (one handler, never re-attached) ----
main.addEventListener("click", ev => {
  try {
  const t = ev.target;
  const d = active();

  // --- Home screen ---
  if(t.closest("#new-btn")){
    const nd=blank(); state.decisions.unshift(nd); state.activeId=nd.id;
    decisionsRef().child(nd.id).set(JSON.parse(JSON.stringify(nd)))
      .then(()=>setSyncBadge("ok","✓ Đã đồng bộ"))
      .catch(e=>{console.error(e);setSyncBadge("off","✗ Lỗi lưu");});
    render(); return;
  }
  if(t.closest("#export-btn") && state.decisions.length){
    const blob=new Blob([JSON.stringify(state.decisions,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${L.exportPrefix}-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href); return;
  }
  if(t.closest("#import-btn")){
    document.getElementById("import-file")?.click(); return;
  }
  const openEl=t.closest("[data-open]");
  if(openEl){ state.activeId=openEl.dataset.open; render(); return; }

  const delEl=t.closest("[data-del]");
  if(delEl){
    if(confirm(L.confirmDel)){
      const id=delEl.dataset.del;
      state.decisions=state.decisions.filter(x=>x.id!==id);
      deleteDecision(id); render();
    } return;
  }
  if(!d) return;

  // --- Wizard: step pills & nav ---
  const stepEl=t.closest("[data-step]");
  if(stepEl && !stepEl.disabled){
    d.step=Math.max(0,Math.min(keysFor(d).length-1,+stepEl.dataset.step));
    persist(); render(); return;
  }
  const modeEl=t.closest("[data-mode]");
  if(modeEl){
    const cur=keysFor(d)[d.step];
    d.mode=modeEl.dataset.mode;
    const nk=keysFor(d);
    let i=nk.indexOf(cur); if(i<0)i=nk.indexOf("results");
    d.step=Math.max(0,i); persist(); render(); return;
  }

  // --- Inline editing ---
  const editEl=t.closest("[data-edit]");
  if(editEl){ editing=editEl.dataset.edit; render(); return; }

  // --- Objectives ---
  if(t.closest("#obj-add")){ objAddFn(); return; }
  const rmObj=t.closest("[data-rm-obj]");
  if(rmObj){ d.objectives=d.objectives.filter(o=>o.id!==rmObj.dataset.rmObj); persist(); render(); return; }

  // --- Alternatives ---
  if(t.closest("#alt-add")){ altAddFn(); return; }
  const togAlt=t.closest("[data-tog-alt]");
  if(togAlt){ const a=d.alternatives.find(x=>x.id===togAlt.dataset.togAlt); if(a){a.eliminated=!a.eliminated;} persist(); render(); return; }
  const rmAlt=t.closest("[data-rm-alt]");
  if(rmAlt){ const id=rmAlt.dataset.rmAlt; d.alternatives=d.alternatives.filter(a=>a.id!==id); delete d.scores[id]; delete d.cons[id]; persist(); render(); return; }

  // --- Swaps ---
  if(t.closest("#swap-add")){
    const so=document.getElementById("swap-obj"),sa=document.getElementById("swap-alt");
    const give=document.getElementById("swap-give")?.value.trim()||"";
    const get_=document.getElementById("swap-get")?.value.trim()||"";
    const note=document.getElementById("swap-note")?.value.trim()||"";
    if(!so?.value||!sa?.value||(!give&&!get_))return;
    d.swaps.push({id:uid(),objective:so.value,altName:sa.value,give,get:get_,note});
    persist(); render(); return;
  }
  const rmSwap=t.closest("[data-rm-swap]");
  if(rmSwap){ d.swaps=d.swaps.filter(s=>s.id!==rmSwap.dataset.rmSwap); persist(); render(); return; }
  const crossEl=t.closest("[data-cross]");
  if(crossEl){ const o=d.objectives.find(x=>x.id===crossEl.dataset.cross); if(o){o.crossed=!o.crossed;} persist(); render(); return; }

  // --- Risks ---
  if(t.closest("#risk-add")){ d.risks.push({id:uid(),u:"",out:"",prob:"M",cons:"",hedge:""}); persist(); render(); return; }
  const rmRisk=t.closest("[data-rm-risk]");
  if(rmRisk){ d.risks=d.risks.filter(x=>x.id!==rmRisk.dataset.rmRisk); persist(); render(); return; }

  // --- Linked decisions ---
  if(t.closest("#linked-add")){ d.linked.push({id:uid(),fut:"",how:"",wide:""}); persist(); render(); return; }
  const rmLinked=t.closest("[data-rm-linked]");
  if(rmLinked){ d.linked=d.linked.filter(x=>x.id!==rmLinked.dataset.rmLinked); persist(); render(); return; }

  // --- Bulk paste (Hệ quả / Chấm điểm tables) ---
  const bulkToggle=t.closest("[data-bulk-toggle]");
  if(bulkToggle){
    const kind=bulkToggle.dataset.bulkToggle;
    const panel=document.getElementById(`bulk-panel-${kind}`);
    if(panel) panel.style.display = (panel.style.display==="none"?"block":"none");
    return;
  }
  const bulkCancel=t.closest("[data-bulk-cancel]");
  if(bulkCancel){
    const kind=bulkCancel.dataset.bulkCancel;
    const panel=document.getElementById(`bulk-panel-${kind}`);
    const input=document.getElementById(`bulk-input-${kind}`);
    if(input) input.value="";
    if(panel) panel.style.display="none";
    return;
  }
  const bulkApply=t.closest("[data-bulk-apply]");
  if(bulkApply){
    const kind=bulkApply.dataset.bulkApply; // "cons" or "score"
    const input=document.getElementById(`bulk-input-${kind}`);
    let grid=parseGrid(input?.value||"");
    if(!grid.length){ alert(L.bulk.empty); return; }
    // Auto-strip header row / label column if pasted from a full table (e.g. Claude chat)
    grid = smartStripGrid(grid, d);
    if(!grid.length){ alert(L.bulk.empty); return; }
    const alts=d.alternatives.filter(a=>!a.eliminated);
    let filled=0;
    grid.forEach((row,ri)=>{
      const obj=d.objectives[ri];
      if(!obj) return;
      row.forEach((raw,ci)=>{
        const alt=alts[ci];
        if(!alt) return;
        const val=raw.trim();
        if(kind==="cons"){
          if(!d.cons[alt.id]) d.cons[alt.id]={};
          d.cons[alt.id][obj.id]=val;
        } else {
          if(!d.scores[alt.id]) d.scores[alt.id]={};
          if(val===""){ delete d.scores[alt.id][obj.id]; }
          else { const n=Math.max(1,Math.min(10,+val||0)); d.scores[alt.id][obj.id]=n; }
        }
        filled++;
      });
    });
    persist();
    alert(filled ? L.bulk.applied(filled) : L.bulk.empty);
    render();
    return;
  }

  // --- Copy summary ---
  if(t.closest("#copy-btn")){
    const tx=document.getElementById("summary-text");
    if(tx){
      navigator.clipboard.writeText(tx.value).catch(()=>{tx.focus();tx.select();document.execCommand("copy");});
      const btn=t.closest("#copy-btn"); btn.textContent=L.y.copied;
      setTimeout(()=>{const b2=document.getElementById("copy-btn");if(b2)b2.textContent=L.y.copy;},1800);
    }
    return;
  }
  } catch(err){ console.error("Click handler error:", err); }
});

// ---- INPUT delegation (oninput for textareas, sliders, number inputs) ----
main.addEventListener("input", ev => {
  try {
  const t = ev.target;
  const d = active();
  if(!d) return;

  // text fields (problem, name)
  if(t.dataset.field){
    const path=t.dataset.field.split(".");
    if(path.length===1) d[path[0]]=t.value; else d[path[0]][path[1]]=t.value;
    persistSoon(); return;
  }
  // objective weight slider
  if(t.dataset.weight){
    const o=d.objectives.find(x=>x.id===t.dataset.weight);
    if(o){ o.weight=+t.value; const wEl=document.getElementById("wt-"+o.id); if(wEl)wEl.textContent=t.value; persistSoon(); }
    return;
  }
  // consequence textarea
  if(t.dataset.cons){
    const [altId,objId]=t.dataset.cons.split("|");
    if(!d.cons[altId])d.cons[altId]={};
    d.cons[altId][objId]=t.value; persistSoon(); return;
  }
  // score input
  if(t.dataset.score){
    const [altId,objId]=t.dataset.score.split("|");
    if(!d.scores[altId])d.scores[altId]={};
    const v=t.value==="" ? undefined : Math.max(1,Math.min(10,+t.value));
    if(v===undefined) delete d.scores[altId][objId]; else d.scores[altId][objId]=v;
    persistSoon(); return;
  }
  // risk fields
  if(t.dataset.risk){
    const [id,field]=t.dataset.risk.split("|");
    const x=d.risks.find(r=>r.id===id); if(x){x[field]=t.value; persistSoon();} return;
  }
  // risk tolerance
  if(t.dataset.rtol){
    d.riskTol[t.dataset.rtol]=t.value; persistSoon(); return;
  }
  // linked decisions
  if(t.dataset.linked){
    const [id,field]=t.dataset.linked.split("|");
    const x=d.linked.find(r=>r.id===id); if(x){x[field]=t.value; persistSoon();} return;
  }
  } catch(err){ console.error("Input handler error:", err); }
});

// ---- PASTE delegation: paste a whole grid (copied from Excel/Sheets/Docs)
// into one cell of the "Hệ quả" or "Chấm điểm" tables and auto-fill the rest ----
main.addEventListener("paste", ev => {
  try {
  const t = ev.target;
  const isCons = !!(t.dataset && t.dataset.cons);
  const isScore = !!(t.dataset && t.dataset.score);
  if(!isCons && !isScore) return;

  const clip = ev.clipboardData || window.clipboardData;
  if(!clip) return;

  // Try HTML first (preserves table structure from Claude chat / web pages)
  const html = clip.getData("text/html");
  let grid = parseHTMLTable(html);

  // Fall back to plain text (Excel, Sheets, markdown, pipe-delimited)
  if(!grid.length){
    const text = clip.getData("text");
    if(!text) return;
    grid = parseGrid(text);
  }

  const isMultiCell = grid.length>1 || (grid[0] && grid[0].length>1);
  if(!isMultiCell) return; // single value: let the normal paste-into-one-cell behavior happen

  ev.preventDefault();
  const d = active();
  if(!d) return;

  // Auto-strip header row / label column if pasted from a full table (e.g. Claude chat)
  grid = smartStripGrid(grid, d);
  if(!grid.length) return;

  const alts = d.alternatives.filter(a=>!a.eliminated);

  const [startAltId, startObjId] = (isCons ? t.dataset.cons : t.dataset.score).split("|");
  const altIdx0 = alts.findIndex(a=>a.id===startAltId);
  const objIdx0 = d.objectives.findIndex(o=>o.id===startObjId);
  if(altIdx0<0 || objIdx0<0) return;

  let filled=0;
  grid.forEach((row,ri)=>{
    row.forEach((raw,ci)=>{
      const obj = d.objectives[objIdx0+ri];
      const alt = alts[altIdx0+ci];
      if(!obj || !alt) return; // past edge of the table: ignore extra cells
      const val = raw.trim();
      if(isCons){
        if(!d.cons[alt.id]) d.cons[alt.id]={};
        d.cons[alt.id][obj.id] = val;
      } else {
        if(!d.scores[alt.id]) d.scores[alt.id]={};
        if(val===""){ delete d.scores[alt.id][obj.id]; }
        else { const n=Math.max(1,Math.min(10,+val||0)); d.scores[alt.id][obj.id]=n; }
      }
      filled++;
    });
  });
  if(filled){ persistSoon(); render(); }
  } catch(err){ console.error("Paste handler error:", err); }
});

// ---- Intercept paste on bulk-paste textareas: if clipboard has an HTML table,
// convert it to tab-delimited text so parseGrid can handle it properly. ----
main.addEventListener("paste", ev => {
  const t = ev.target;
  if(!t || !(t.id === "bulk-input-cons" || t.id === "bulk-input-score")) return;
  const clip = ev.clipboardData || window.clipboardData;
  if(!clip) return;
  const html = clip.getData("text/html");
  const grid = parseHTMLTable(html);
  if(grid.length > 0 && (grid.length > 1 || (grid[0] && grid[0].length > 1))){
    ev.preventDefault();
    const tsv = grid.map(row => row.join("\t")).join("\n");
    // Insert at cursor position (or replace selection)
    const start = t.selectionStart, end = t.selectionEnd;
    t.value = t.value.substring(0, start) + tsv + t.value.substring(end);
    t.selectionStart = t.selectionEnd = start + tsv.length;
    t.dispatchEvent(new Event("input", {bubbles:true}));
  }
}, true); // capture phase to run before the textarea's default paste

// Flush debounced persist when user leaves a text field
main.addEventListener("blur", ev => {
  if(_persistTimer){
    clearTimeout(_persistTimer);
    _persistTimer = null;
    persist();
  }
}, true);  // capture phase so it fires even if focus moves outside main

// ---- CHANGE delegation (checkboxes, selects, file input) ----
main.addEventListener("change", ev => {
  try {
  const t = ev.target;
  const d = active();
  if(!d) return;
  // traps checkboxes
  if(t.dataset.trap){
    d.traps[t.dataset.trap]=t.checked; persist(); render(); return;
  }
  // risk probability select
  if(t.dataset.risk){
    const [id,field]=t.dataset.risk.split("|");
    const x=d.risks.find(r=>r.id===id); if(x){x[field]=t.value; persist();}
  }
  } catch(err){ console.error("Change handler error:", err); }
});

// ---- KEYDOWN delegation (Enter to add objectives/alternatives) ----
main.addEventListener("keydown", ev => {
  const d = active();
  if(!d || ev.key !== "Enter") return;
  if(ev.target.id === "obj-input"){ objAddFn(); return; }
  if(ev.target.id === "alt-input"){ altAddFn(); return; }
});

// Shared add functions (called from click AND keydown)
function objAddFn(){
  const d=active(); if(!d) return;
  const inp=document.getElementById("obj-input"); const v=inp?.value.trim(); if(!v)return;
  d.objectives.push({id:uid(),name:v,weight:5,crossed:false}); persist(); render();
  document.getElementById("obj-input")?.focus();
}
function altAddFn(){
  const d=active(); if(!d) return;
  const inp=document.getElementById("alt-input"); const v=inp?.value.trim(); if(!v)return;
  d.alternatives.push({id:uid(),name:v,eliminated:false}); persist(); render();
  document.getElementById("alt-input")?.focus();
}

// ---- File import (on a hidden input outside dynamic content) ----
document.getElementById("import-file")?.addEventListener("change",ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const incoming=JSON.parse(r.result);
      if(!Array.isArray(incoming)) throw new Error("bad format");
      let added=0, updated=0;
      for(const inc of incoming){
        if(!inc || !inc.id) continue;
        normalize(inc);
        const i=state.decisions.findIndex(x=>x.id===inc.id);
        if(i>=0){ state.decisions[i]=inc; updated++; }
        else { state.decisions.push(inc); added++; }
      }
      persistAll(); render();
      alert(L.impOk(added,updated));
    }catch{ alert(L.impBad); }
  };
  r.readAsText(f); ev.target.value="";
});

// ---- Minimal per-render binding (only for inline-edit focus/blur) ----
function bind(){
  const d=active();
  if(!d) return;
  const ei=document.getElementById("edit-input");
  if(ei){
    ei.focus(); const n=ei.value.length; ei.setSelectionRange(n,n);
    let done=false;
    const save=()=>{ if(done)return; done=true;
      const [type,id]=editing.split("|"); const v=ei.value.trim();
      if(v){
        if(type==="obj"){ const o=d.objectives.find(x=>x.id===id); if(o)o.name=v; }
        else { const a=d.alternatives.find(x=>x.id===id); if(a)a.name=v; }
      }
      editing=null; persist(); render(); };
    ei.addEventListener("keydown",e=>{
      if(e.key==="Enter")save();
      if(e.key==="Escape"){done=true;editing=null;render();}
    });
    ei.addEventListener("blur",save);
  }
}

window.addEventListener("beforeunload",e=>{
  // Flush any pending debounced persist
  if(_persistTimer){ clearTimeout(_persistTimer); _persistTimer=null; persist(); }
  if(syncStatus==="saving"){ e.preventDefault(); e.returnValue=""; }
});

// ---------- Auth ----------
const loginScreen = document.getElementById("login-screen");
const loginBtn = document.getElementById("login-btn");
const loginError = document.getElementById("login-error");
const logoutBtn = document.getElementById("logout-btn");
const userInfoEl = document.getElementById("user-info");
const googleProvider = new firebase.auth.GoogleAuthProvider();

const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

loginBtn.addEventListener("click", ()=>{
  loginError.textContent = "";
  if(isMobile){
    // Redirect flow — more reliable on mobile (no popup to block)
    auth.signInWithRedirect(googleProvider);
  } else {
    auth.signInWithPopup(googleProvider).catch(err=>{
      const msg = {
        "auth/popup-closed-by-user":"Cửa sổ đăng nhập đã bị đóng.",
        "auth/cancelled-popup-request":"",
        "auth/popup-blocked":"Trình duyệt chặn cửa sổ đăng nhập. Hãy cho phép popup."
      }[err.code] || err.message;
      if(msg) loginError.textContent = msg;
    });
  }
});

// Handle redirect result (fires on page load after mobile sign-in redirect)
auth.getRedirectResult().then(result=>{
  // If we got a redirect result, auth state will update via onAuthStateChanged
  if(result && result.user) loginError.textContent = "";
}).catch(err=>{
  if(err.code && err.code !== "auth/cancelled-popup-request"){
    loginError.textContent = err.message || "Đăng nhập thất bại. Vui lòng thử lại.";
    loginBtn.style.display = "";
  }
});

// If we're returning from a redirect, show loading state
if(isMobile && sessionStorage.getItem("__auth_redirect")){
  loginBtn.style.display = "none";
  loginError.textContent = "Đang đăng nhập…";
  loginError.style.color = "var(--ink-soft)";
}
// Mark when we start a redirect
loginBtn.addEventListener("click", ()=>{
  if(isMobile) sessionStorage.setItem("__auth_redirect","1");
});

logoutBtn.addEventListener("click",()=>{
  if(unsubscribe){ decisionsRef().off("value", unsubscribe); unsubscribe=null; }
  state.decisions=[]; state.activeId=null;
  auth.signOut();
});

auth.onAuthStateChanged(user=>{
  if(user){
    sessionStorage.removeItem("__auth_redirect");
    loginScreen.style.display="none";
    logoutBtn.style.display="";
    userInfoEl.style.display="";
    userInfoEl.textContent=user.displayName||user.email;
    render();            // ← show UI immediately (empty state) so screen is never blank
    startListening();
  } else {
    sessionStorage.removeItem("__auth_redirect");
    loginScreen.style.display="flex";
    loginBtn.style.display="";
    loginError.textContent="";
    loginError.style.color="";
    logoutBtn.style.display="none";
    userInfoEl.style.display="none";
    document.getElementById("sync-badge").style.display="none";
    if(unsubscribe){ decisionsRef().off("value", unsubscribe); unsubscribe=null; }
    state.decisions=[]; state.activeId=null;
    main.innerHTML="";
  }
});
</script>
